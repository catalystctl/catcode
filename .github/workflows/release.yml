name: Release

# Build prebuilt artifacts for ALL platforms (Linux/macOS/Windows) on a single
# ubuntu runner via cross-compilation, plus the cross-platform web bundle, and
# publish them to a GitHub Release. The installers (install.sh /
# install.ps1 -WithWeb) download these — users never compile anything.
#
# Triggered by every push to master (and v* tags / manual dispatch). The
# version IS the git commit (short SHA) — no manual version bumping; each push
# produces a release keyed by its commit. The installers download `latest`
# (the most recent commit's release) or a pinned SHA via --version.

on:
  push:
    branches: [master]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (defaults to the git commit short SHA)'
        required: false

permissions:
  contents: write   # needed by gh release create / softprops/action-gh-release

jobs:
  release:
    name: Build + publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version (git commit short SHA)
        id: ver
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            v="${{ inputs.version }}"
          else
            v="$(git rev-parse --short HEAD)"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Using version: $v (commit)"

      # --- Rust + cross-compile targets -----------------------------------
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu, aarch64-apple-darwin, x86_64-apple-darwin
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      # --- Go (TUI builds) ------------------------------------------------
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      # --- zig + cargo-zigbuild (macOS cross-compile from Linux) ----------
      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: '0.13.0'
      - name: Install cargo-zigbuild
        run: pip install cargo-zigbuild

      # --- system deps: mingw (windows gnu), xorriso (dmg), jq, zip, appimagetool deps ---
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            mingw-w64 msitools xorriso jq zip curl python3 file libfuse2
      - name: Install Bun (web build)
        uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # --- build everything -----------------------------------------------
      - name: Build all platform artifacts (TUI + core, all platforms)
        run: bash release-all.sh "${{ steps.ver.outputs.version }}"

      - name: Build web bundle (prebuilt Next.js standalone)
        run: bash release-web.sh "${{ steps.ver.outputs.version }}"

      - name: List artifacts
        run: ls -la dist/

      # --- publish ---------------------------------------------------------
      - name: Create GitHub Release with assets
        id: publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Release tag = the version (the commit short SHA), unless a v* tag push.
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tag="$GITHUB_REF_NAME"
          else
            tag="${{ steps.ver.outputs.version }}"
          fi
          echo "Publishing release '$tag'..."
          # --target master creates the SHA tag at HEAD (no pre-existing tag needed).
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/* --clobber
          else
            gh release create "$tag" --target master --title "$tag" --generate-notes dist/*
          fi

    outputs:
      tag: ${{ steps.publish.outputs.tag }}

  release-web-windows:
    name: Build Windows web bundle
    runs-on: windows-latest
    needs: release
    steps:
      - uses: actions/checkout@v4

      # Bash scripts (release-web.sh) must keep LF line endings on Windows.
      - name: Force LF line endings for shell scripts
        shell: bash
        run: |
          git config --global core.autocrlf false
          git checkout -- .

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            v="${{ inputs.version }}"
          else
            v="$(git rev-parse --short HEAD)"
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "Using version: $v (commit)"

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - uses: oven-sh/setup-bun@v2

      # Next.js file tracing / webpack can scan PATH directories; the WindowsApps
      # folder on GitHub runners contains restricted reparse points that cause
      # EACCES. Strip it from PATH before building.
      - name: Sanitize PATH for Windows build
        shell: pwsh
        run: |
          $clean = ($env:Path -split ';' | Where-Object { $_ -notlike '*WindowsApps*' }) -join ';'
          echo "PATH=$clean" >> "$env:GITHUB_ENV"

      - name: Build web bundle on Windows
        shell: bash
        env:
          PATH: ${{ env.PATH }}
        run: bash release-web.sh "${{ steps.ver.outputs.version }}"

      - name: Rename to Windows-specific artifact
        shell: bash
        run: |
          mv "dist/catcode-web-${{ steps.ver.outputs.version }}.tar.gz"              "dist/catcode-web-${{ steps.ver.outputs.version }}-windows.tar.gz"

      - name: Upload Windows web bundle to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tag="$GITHUB_REF_NAME"
          else
            tag="${{ steps.ver.outputs.version }}"
          fi
          gh release upload "$tag" "dist/catcode-web-${{ steps.ver.outputs.version }}-windows.tar.gz" --clobber
