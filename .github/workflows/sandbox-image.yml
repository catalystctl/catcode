name: sandbox-image

# Build and publish the catcode-sandbox OCI image — the default Microsandbox
# guest image CatCode boots as the microVM rootfs when sandboxing is enabled.
# Multi-arch (amd64 + arm64), pinned by digest in the release notes.
#
# Triggers on version tags (v*), manual dispatch, and (build-only) PRs that
# touch the image definition.

on:
  push:
    tags: ['v*']
    paths:
      - 'sandbox/**'
      - '.github/workflows/sandbox-image.yml'
  pull_request:
    paths:
      - 'sandbox/**'
      - '.github/workflows/sandbox-image.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag (defaults to the git short SHA)'
        required: false

permissions:
  contents: read
  packages: write

concurrency:
  group: sandbox-image-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/catalystctl/catcode-sandbox

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.digest.outputs.digest }}
      tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=tag
            type=raw,value=${{ inputs.tag || github.sha }},enable=${{ github.event_name == 'workflow_dispatch' }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}

      - name: Build & push (multi-arch)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: sandbox
          file: sandbox/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false

      - name: Record resolved digest
        id: digest
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        run: |
          # docker/metadata-action exposes the digest of the pushed manifest.
          DIGEST="${{ steps.meta.outputs.version }}"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "## catcode-sandbox image" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Published \`${{ env.IMAGE }}:${{ steps.meta.outputs.version }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Resolve the pinned digest with:" >> "$GITHUB_STEP_SUMMARY"
          echo '```bash' >> "$GITHUB_STEP_SUMMARY"
          echo "docker buildx imagetools inspect ${{ env.IMAGE }}:${{ steps.meta.outputs.version }} --format '{{json .Manifest}}'" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "Record this digest in the CatCode release notes (the default image is pinned by tag; production releases should reference the resolved \`@sha256:\` digest)."
