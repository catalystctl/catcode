name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  core:
    name: core (rust)
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core
      - name: rustfmt check
        working-directory: core
        run: cargo fmt --all -- --check
      - name: clippy
        working-directory: core
        run: cargo clippy --all-targets
      - name: test (--locked)
        working-directory: core
        run: cargo test --locked

  tui:
    name: tui (go)
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('tui/go.sum') }}
          restore-keys: ${{ runner.os }}-go-
      - name: go vet
        working-directory: tui
        run: go vet ./...
      - name: go test
        working-directory: tui
        run: go test ./...
      - name: go build
        working-directory: tui
        run: go build ./...

  cross-compile:
    name: tui cross-compile (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: [self-hosted, Linux, X64]
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: windows
            goarch: amd64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - name: go build (plain)
        working-directory: tui
        run: CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -trimpath .
      - name: go build -tags embed_core (staged dummy core)
        working-directory: tui
        # The embed_core tag embeds tui/embed/catcode-core via go:embed; stage an
        # empty file so the pattern matches (compile-check only — the real core
        # is injected at release time by release-*.sh).
        run: |
          mkdir -p embed && touch embed/catcode-core
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -trimpath -tags embed_core .

  docker:
    name: docker image
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - name: build image (no push; buildah chroot — runs under rootless podman)
        # Nested OCI build: chroot isolation + vfs storage work inside a
        # rootless container without extra privileges (build-check only).
        run: buildah build --isolation chroot --storage-driver vfs -t catalyst-code:ci .
