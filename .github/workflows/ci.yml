name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

# A newer commit makes an in-flight run for the same branch obsolete. This is
# especially valuable on the self-hosted runner, where stale builds otherwise
# sit in front of the commit a developer is actually waiting for.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: core (rust)
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - name: install native deps (microsandbox SDK links libcap-ng)
        run: sudo apt-get update -qq && sudo apt-get install -y libcap-ng-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: core
      - name: rustfmt check
        working-directory: core
        run: cargo fmt --all -- --check
      - name: clippy
        working-directory: core
        run: cargo clippy --all-targets
      - name: test (--locked)
        working-directory: core
        run: cargo test --locked
      - name: release artifact smoke
        working-directory: core
        run: |
          cargo build --release --locked
          target/release/core --version
          target/release/core --help | grep -q 'newline-delimited JSON'

  tui:
    name: tui (go)
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: tui/go.sum
      - name: gofmt check
        working-directory: tui
        run: test -z "$(gofmt -l .)"
      - name: go vet
        working-directory: tui
        run: go vet ./...
      - name: go test
        working-directory: tui
        run: go test ./...
      - name: go build
        working-directory: tui
        run: go build ./...

  cross-compile:
    name: tui cross-compile (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: [self-hosted, Linux, X64]
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            check_plain: false
          - goos: darwin
            goarch: arm64
            check_plain: false
          - goos: darwin
            goarch: amd64
            check_plain: false
          - goos: windows
            goarch: amd64
            check_plain: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: tui/go.sum
      - name: go build (plain Windows installer variant)
        if: matrix.check_plain
        working-directory: tui
        run: CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -trimpath .
      - name: go build -tags embed_core (staged dummy core)
        working-directory: tui
        # The embed_core tag embeds tui/embed/catcode-core via go:embed; stage an
        # empty file so the pattern matches (compile-check only — the real core
        # is injected at release time by release-*.sh). Plain builds are covered
        # natively by the tui job and above for the Windows MSI variant; macOS
        # releases only the embedded variant.
        run: |
          mkdir -p embed && touch embed/catcode-core
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -trimpath -tags embed_core .

  web:
    name: web (next)
    runs-on: [self-hosted, Linux, X64]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.14'
      - name: protocol schema consistency
        run: node scripts/check-protocol-schema.mjs
      - name: architecture boundary consistency
        run: node scripts/check-architecture.mjs
      - name: Restore Bun package cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-${{ runner.arch }}-bun-${{ hashFiles('web/bun.lock', 'sdk/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-bun-
      - name: Restore Next.js build cache
        uses: actions/cache@v4
        with:
          path: web/.next/cache
          key: ${{ runner.os }}-${{ runner.arch }}-next-${{ hashFiles('web/bun.lock') }}-${{ hashFiles('web/src/**/*.ts', 'web/src/**/*.tsx', 'web/public/**', 'web/next.config.mjs', 'web/tsconfig.json') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-next-${{ hashFiles('web/bun.lock') }}-
      - name: install
        working-directory: web
        run: bun install --frozen-lockfile
      - name: SDK install
        working-directory: sdk
        run: bun install --frozen-lockfile
      - name: SDK typecheck
        working-directory: sdk
        run: bun run typecheck
      - name: SDK protocol tests
        working-directory: sdk
        run: bun test
      - name: typecheck
        working-directory: web
        run: bun run typecheck
      - name: lint
        working-directory: web
        run: bun run lint
      - name: test
        working-directory: web
        run: bun test
      - name: build
        # release.yml performs the production build for master in parallel with
        # this workflow. PRs and non-release branches still get a full build.
        if: github.ref != 'refs/heads/master' || github.event_name == 'pull_request'
        working-directory: web
        run: node node_modules/next/dist/bin/next build
        env:
          # Single-user localhost default; build must not require a public origin.
          CATCODE_WEB_ORIGIN: http://localhost:49283
